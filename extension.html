<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rankly- Page Analyser</title>
    <style>
      /*
        CRITICAL: Do NOT set height:100% on html/body/root.
        That locks the viewport height and prevents window scroll-
        window.scrollY stays 0 forever and the scroll indicator never fires.
        Let the content push the page height naturally.
      */
      html {
        width: 100%;
        min-width: 320px;
        /* no height constraint- content grows the page */
      }
      body {
        width: 100%;
        min-width: 320px;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        /* no height:100%- window must be able to scroll */
      }
      #root {
        width: 100%;
        /* no height:100% */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/extensionEntry.jsx"></script>
  </body>
</html>
